name: Eval — Extractor & Synthesis Regression Tests

on:
  pull_request:
    paths:
      - "backend/app/agents/extractors/**"
      - "backend/app/agents/synthesis/**"
      - "backend/eval/**"
  push:
    branches: [main]
    paths:
      - "backend/app/agents/extractors/**"
      - "backend/app/agents/synthesis/**"
      - "backend/eval/**"
  workflow_dispatch:

jobs:
  eval:
    if: false  # Disabled — remove to re-enable
    runs-on: ubuntu-latest
    environment: Production
    permissions:
      contents: read
      id-token: write   # Required for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install "google-adk[eval]" pytest pytest-asyncio

      - name: Authenticate to Google Cloud (Workload Identity Federation)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/973037358388/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions@coral-antonym-286617.iam.gserviceaccount.com"

      - name: Run eval regression tests
        working-directory: backend
        env:
          GOOGLE_CLOUD_PROJECT: coral-antonym-286617
          GOOGLE_GENAI_USE_VERTEXAI: "TRUE"
        run: pytest eval/test_extractors.py -v --tb=short
