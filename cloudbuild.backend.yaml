# Backend build: Docker image -> Artifact Registry -> Cloud Run (me-west1).
# Cloud Run Git triggers set _AR_HOSTNAME / _AR_REPOSITORY; defaults match that layout.
# Build SA needs artifactregistry.writer on repo cloud-run-source-deploy (often pre-created by Cloud Run).
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "${_AR_HOSTNAME}/$PROJECT_ID/${_AR_REPOSITORY}/d-done-backend:$SHORT_SHA",
        "-f",
        "backend/Dockerfile",
        ".",
      ]

  - name: gcr.io/cloud-builders/docker
    args:
      [
        "push",
        "${_AR_HOSTNAME}/$PROJECT_ID/${_AR_REPOSITORY}/d-done-backend:$SHORT_SHA",
      ]

  - name: gcr.io/cloud-builders/gcloud
    args:
      [
        "run",
        "deploy",
        "${_SERVICE}",
        "--image",
        "${_AR_HOSTNAME}/$PROJECT_ID/${_AR_REPOSITORY}/d-done-backend:$SHORT_SHA",
        "--region",
        "${_REGION}",
        "--platform",
        "managed",
        "--quiet",
      ]

substitutions:
  _SERVICE: "d-done-api"
  _REGION: "me-west1"
  _AR_HOSTNAME: "me-west1-docker.pkg.dev"
  _AR_REPOSITORY: "cloud-run-source-deploy"

# Required when a custom build service account is used on the trigger.
# Avoids needing an explicit logs bucket.
options:
  logging: CLOUD_LOGGING_ONLY
