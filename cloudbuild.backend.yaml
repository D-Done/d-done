# Backend build: Docker image -> GCR -> Cloud Run (me-west1).
# If the trigger uses a custom service account (e.g. github-actions@PROJECT.iam.gserviceaccount.com),
# that SA must have: Logs Writer + permission to push to GCR. See docs/cloud-build-iam.md.
steps:
  - name: gcr.io/cloud-builders/docker
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/d-done-backend:$SHORT_SHA",
        "-f",
        "backend/Dockerfile",
        ".",
      ]

  - name: gcr.io/cloud-builders/docker
    args: ["push", "gcr.io/$PROJECT_ID/d-done-backend:$SHORT_SHA"]

  - name: gcr.io/cloud-builders/gcloud
    args:
      [
        "run",
        "deploy",
        "${_SERVICE}",
        "--image",
        "gcr.io/$PROJECT_ID/d-done-backend:$SHORT_SHA",
        "--region",
        "${_REGION}",
        "--platform",
        "managed",
        "--quiet",
      ]

substitutions:
  _SERVICE: "d-done-api"
  _REGION: "me-west1"

# Required when a custom build service account is used on the trigger.
# Avoids needing an explicit logs bucket.
options:
  logging: CLOUD_LOGGING_ONLY
