version: "3.9"

# All env vars live in backend/.env.local (and frontend/.env.local). Copy backend/.env.example
# to backend/.env.local and set DATABASE_URL to postgresql://postgres:postgres@db:5432/d_done
# for devcontainer. Only container-specific vars are set here (host "db", PYTHONPATH, frontend URL).

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: d_done
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d d_done"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ---- Backend (FastAPI) ----
  backend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.backend
    volumes:
      - ..:/workspace:cached
    working_dir: /workspace/backend
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/d_done
      PYTHONPATH: /workspace
    depends_on:
      db:
        condition: service_healthy

  # ---- Frontend (Next.js) ----
  frontend:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.frontend
    volumes:
      - ..:/workspace:cached
      - frontend_node_modules:/workspace/frontend/node_modules
    working_dir: /workspace/frontend
    command: sleep infinity
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1

  # ---- Main devcontainer workspace ----
  app:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile.app
    volumes:
      - ..:/workspace:cached
      - frontend_node_modules:/workspace/frontend/node_modules
    working_dir: /workspace
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/d_done
      PYTHONPATH: /workspace
      NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
    ports:
      - "8000:8000"
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  frontend_node_modules:
